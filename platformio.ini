; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:goouuu-esp32-s3-cam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ---- 内存与 Flash 配置 ----
board_build.arduino.memory_type = dio_opi    ; DIO Flash + OPI PSRAM
board_build.partitions = default_16MB.csv     ; 16MB 分区表
board_build.mcu = esp32s3

; ---- 上传配置 ----
board_upload.flash_size = 16MB
board_upload.maximum_ram_size = 8716288

; ---- 编译标志 ----
build_flags =
  -DBOARD_HAS_PSRAM                          ; 启用 PSRAM
  -DARDUINO_USB_MODE=1                       ; USB 模式
  -DARDUINO_USB_CDC_ON_BOOT=1               ; USB CDC 串口

; ---- 串口监视器 ----
monitor_speed = 115200                        ; 与 main.cpp 中 Serial.begin(115200) 一致

; ---- 依赖库 ----
lib_deps =
  adafruit/Adafruit NeoPixel@^1.12.2         ; 板载 RGB LED 控制
  https://github.com/dunknowcoding/NiusCam.git#v0.2.0  ; 摄像头 + SD 卡封装库
